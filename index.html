<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Trading Journal</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .box {
      flex: 1;
      min-width: 300px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    .description {
      margin-top: 10px;
      font-size: 14px;
    }

    .placeholder {
      width: 100%;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eee;
      border-radius: 8px;
      color: #666;
      font-style: italic;
      text-align: center;
    }
  </style>
</head>

<body>

<h1>📊 My Market Analysis Journal</h1>

<!-- TRADE 1 -->
<div class="container">

  <!-- LEFT: ANALYSIS -->
  <div class="box">
    <h2>📊 Analysis & Prediction</h2>

    <img src="analysis1.png" alt="Analysis">

    <div class="description">
      BTC approaching resistance.<br>
      Possible breakout setup.<br>
      Entry: 42,000 | Target: 45,000
    </div>
  </div>

  <!-- RIGHT: RESULT -->
  <div class="box">
    <h2>📈 Result</h2>

    <!-- SHOW THIS FIRST -->
    <div class="placeholder">
      ⏳ Coming soon...<br>
      Waiting for market result
    </div>

    <!-- LATER REPLACE WITH THIS
    <img src="result1.png" alt="Result">

    <div class="description">
      ✅ Target reached.<br>
      Trade closed in profit.
    </div>
    -->

  </div>

</div>

</body>
</html>
